version: "3.8"

services:
  db:
    image: postgres:17
    container_name: shiftplanner-db
    environment:
      POSTGRES_DB: shiftplanner
      POSTGRES_USER: shiftplanner
      POSTGRES_PASSWORD: shiftplanner
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftplanner -d shiftplanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: shiftplanner-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8686:8686"